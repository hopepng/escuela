<div class="login-wrapper">
  <div class="login-card">
    <h2>Iniciar sesión</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="correo@ejemplo.com" />
        <span class="error-msg" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Email inválido
        </span>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="••••••••" />
        <span class="error-msg" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Campo requerido
        </span>
      </div>
      <span class="error-msg" *ngIf="error">{{ error }}</span>
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
