<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar">

    <div class="sidebar-top">
      <div class="brand">
        <span class="brand-dot"></span>
        SPA App
      </div>
    </div>

    <div class="user-info" *ngIf="currentUser">
      <div class="avatar">{{ currentUser.name.charAt(0) }}</div>
      <div class="user-meta">
        <p class="user-name">{{ currentUser.name }}</p>
        <p class="user-role">{{ currentUser.role | roleLabel }}</p>
      </div>
    </div>

    <div class="nav-section">
      <p class="nav-label">Menú</p>
      <ul class="nav-links">

        <li>
          <a routerLink="/dashboard/courses" routerLinkActive="active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
            Cursos
          </a>
        </li>

        <li *appHasRole="['admin']">
          <a routerLink="/dashboard/users" routerLinkActive="active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Usuarios
          </a>
        </li>

        <li *appHasRole="['admin', 'estudiante']">
          <a routerLink="/dashboard/enrollments" routerLinkActive="active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <path d="M16 2v4M8 2v4M3 10h18"/>
            </svg>
            Matrículas
          </a>
        </li>

      </ul>
    </div>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Cerrar sesión
      </button>
    </div>

  </nav>

  <!-- Content -->
  <main class="content">
    <router-outlet></router-outlet>
  </main>

</div>
